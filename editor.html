<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bloom 主题色编辑器 | Theme Color Editor</title>

    <link rel="icon" href="bloom/favicon.svg" type="image/svg+xml" />
    <link id="theme-css" rel="stylesheet" href="dist/bloom-petal.css" />
    <link rel="stylesheet" href="site.css" />
    <script src="./bloom/marked.min.js"></script>
    <style>
        .editor-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2rem;
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .editor-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .editor-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text);
        }

        .preset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .preset-btn {
            padding: 0.75rem;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--bg);
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-size: 0.9rem;
        }

        .preset-btn:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .preset-btn.active {
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        .preset-color {
            width: 100%;
            height: 24px;
            border-radius: 6px;
            margin-bottom: 0.5rem;
        }

        .color-control {
            margin-bottom: 1.25rem;
        }

        .color-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-semi);
        }

        .color-value {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--accent);
        }

        .color-input-wrapper {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .color-picker {
            width: 60px;
            height: 40px;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
        }

        .color-text-input {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }

        .export-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .export-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .preview-container {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            min-height: 600px;
        }
    </style>
</head>

<body>
    <div class="bg-canvas-wrap">
        <div class="bg-blob"></div>
        <div class="bg-blob bg-blob-2"></div>
        <div class="bg-blob bg-blob-3"></div>
        <div class="bg-grain"></div>
    </div>

    <header class="topbar">
        <div class="topbar-inner">
            <a href="index.html" class="brand">
                <svg class="brand-logo" viewBox="0 0 80 80" width="32" height="32">
                    <defs>
                        <linearGradient id="brand-grad" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0" stop-color="var(--accent)" />
                            <stop offset="1" stop-color="var(--accent-hover)" />
                        </linearGradient>
                    </defs>
                    <g transform="translate(10,10)">
                        <g fill="url(#brand-grad)">
                            <path d="M30 12c7 0 12 6 12 12 0 7-6 14-12 14S18 31 18 24c0-6 5-12 12-12Z" />
                            <path d="M16 28c6-4 14-3 18 2 5 6 2 16-6 20-8 4-17 1-20-7-2-6 2-12 8-15Z" opacity="0.92" />
                            <path d="M44 28c6 3 10 9 8 15-3 8-12 11-20 7-8-4-11-14-6-20 4-5 12-6 18-2Z"
                                opacity="0.92" />
                        </g>
                        <circle cx="30" cy="32" r="5" fill="var(--bg)" opacity="0.92" />
                    </g>
                </svg>
                <span>主题色编辑器</span>
            </a>
            <div class="toolbar">
                <a href="index.html" class="nav-link">首页</a>
                <a href="showcase.html" class="nav-link">实时预览</a>
                <a href="editor.html" class="nav-link">编辑器</a>
            </div>
        </div>
    </header>

    <div class="editor-layout">
        <aside class="editor-panel">
            <h2 class="editor-title">🎨 主题预设</h2>
            <div class="preset-grid" id="preset-grid"></div>

            <h2 class="editor-title" style="margin-top: 2rem;">🎯 自定义颜色</h2>
            <div id="color-controls"></div>

            <button class="export-btn" id="export-btn">📋 导出 CSS 代码</button>
        </aside>

        <main class="preview-container">
            <article id="write">
                <div style="text-align: center; padding: 3rem 0; color: var(--text-semi);">
                    <p>正在加载预览内容...</p>
                </div>
            </article>
        </main>
    </div>

    <script src="site.js"></script>
    <script>
        // 16 套主题预设配置
        const THEME_PRESETS = {
            petal: { name: '🌸 花瓣', accent: 'oklch(64% 0.22 350)', bg: 'oklch(98% 0.01 350)', text: 'oklch(25% 0.02 354)' },
            'petal-dark': { name: '🔮 花瓣暗夜', accent: 'oklch(75% 0.18 350)', bg: 'oklch(20% 0.02 350)', text: 'oklch(98% 0.01 350)' },
            mist: { name: '☁️ 雾蓝', accent: 'oklch(50% 0.08 240)', bg: 'oklch(96% 0.01 240)', text: 'oklch(25% 0.02 240)' },
            'mist-dark': { name: '💠 雾蓝暗夜', accent: 'oklch(72% 0.12 240)', bg: 'oklch(20% 0.02 240)', text: 'oklch(96% 0.01 240)' },
            verdant: { name: '🍃 草木', accent: 'oklch(50% 0.07 160)', bg: 'oklch(96% 0.01 160)', text: 'oklch(25% 0.02 160)' },
            'verdant-dark': { name: '🌲 草木暗夜', accent: 'oklch(72% 0.12 160)', bg: 'oklch(18% 0.02 160)', text: 'oklch(96% 0.01 160)' },
            stone: { name: '🧱 暖石', accent: 'oklch(50% 0.06 40)', bg: 'oklch(96% 0.01 60)', text: 'oklch(25% 0.02 40)' },
            'stone-dark': { name: '🪨 暖石暗夜', accent: 'oklch(75% 0.12 40)', bg: 'oklch(20% 0.02 40)', text: 'oklch(96% 0.01 40)' },
            amber: { name: '💎 琥珀', accent: 'oklch(60% 0.14 65)', bg: 'oklch(98% 0.01 65)', text: 'oklch(25% 0.02 65)' },
            'amber-dark': { name: '🔥 琥珀暗夜', accent: 'oklch(75% 0.16 65)', bg: 'oklch(20% 0.02 65)', text: 'oklch(98% 0.01 65)' },
            spring: { name: '🌸 薰衣草', accent: 'oklch(60% 0.14 295)', bg: 'oklch(96% 0.01 295)', text: 'oklch(25% 0.02 295)' },
            'spring-dark': { name: '🔮 薰衣草暗夜', accent: 'oklch(75% 0.14 295)', bg: 'oklch(18% 0.02 295)', text: 'oklch(96% 0.01 295)' },
            ripple: { name: '🌊 涟漪', accent: 'oklch(50% 0.10 195)', bg: 'oklch(98% 0.01 195)', text: 'oklch(25% 0.02 195)' },
            'ripple-dark': { name: '🌊 涟漪暗夜', accent: 'oklch(72% 0.14 195)', bg: 'oklch(18% 0.02 195)', text: 'oklch(96% 0.01 195)' },
            ink: { name: '🖋️ 水墨', accent: 'oklch(58% 0.18 30)', bg: 'oklch(99% 0.005 30)', text: 'oklch(20% 0.01 30)' },
            'ink-dark': { name: '🖋️ 水墨暗夜', accent: 'oklch(72% 0.16 30)', bg: 'oklch(15% 0.01 30)', text: 'oklch(96% 0.005 30)' }
        };

        let currentColors = { ...THEME_PRESETS.petal };

        // 初始化预设按钮
        function initPresets() {
            const grid = document.getElementById('preset-grid');
            Object.entries(THEME_PRESETS).forEach(([key, preset]) => {
                const btn = document.createElement('button');
                btn.className = 'preset-btn';
                btn.innerHTML = `
          <div class="preset-color" style="background: ${preset.accent}"></div>
          <div>${preset.name}</div>
        `;
                btn.onclick = () => applyPreset(key);
                grid.appendChild(btn);
            });
        }

        // 应用预设
        function applyPreset(presetKey) {
            currentColors = { ...THEME_PRESETS[presetKey] };
            updateColors();
            updateUI();
            document.querySelectorAll('.preset-btn').forEach((btn, i) => {
                btn.classList.toggle('active', Object.keys(THEME_PRESETS)[i] === presetKey);
            });
        }

        // 初始化颜色控制器
        function initColorControls() {
            const container = document.getElementById('color-controls');
            const controls = [
                { key: 'accent', label: '强调色 (Accent)' },
                { key: 'bg', label: '背景色 (Background)' },
                { key: 'text', label: '文字色 (Text)' }
            ];

            controls.forEach(({ key, label }) => {
                const div = document.createElement('div');
                div.className = 'color-control';
                div.innerHTML = `
          <div class="color-label">
            <span>${label}</span>
            <span class="color-value" id="${key}-value">${currentColors[key]}</span>
          </div>
          <div class="color-input-wrapper">
            <input type="color" class="color-picker" id="${key}-picker" />
            <input type="text" class="color-text-input" id="${key}-input" value="${currentColors[key]}" />
          </div>
        `;
                container.appendChild(div);

                // 绑定事件
                const input = div.querySelector(`#${key}-input`);
                input.oninput = (e) => {
                    currentColors[key] = e.target.value;
                    updateColors();
                    document.getElementById(`${key}-value`).textContent = e.target.value;
                };
            });
        }

        // 更新 CSS 变量
        function updateColors() {
            const root = document.documentElement;

            // 基础颜色
            root.style.setProperty('--accent', currentColors.accent);
            root.style.setProperty('--bg', currentColors.bg);
            root.style.setProperty('--text', currentColors.text);

            // 判断是否为深色主题（背景亮度 < 50%）
            const isDark = currentColors.bg.includes('oklch') &&
                parseInt(currentColors.bg.match(/\d+/)[0]) < 50;

            // 根据背景色自动计算衍生颜色
            if (isDark) {
                // 深色主题
                root.style.setProperty('--surface', currentColors.bg.replace(/\d+%/, (m) => `${parseInt(m) + 6}%`));
                root.style.setProperty('--text-semi', currentColors.text.replace(/\d+%/, '65%'));
                root.style.setProperty('--code-bg', currentColors.bg.replace(/\d+%/, (m) => `${parseInt(m) + 4}%`));
                root.style.setProperty('--code-text', currentColors.text.replace(/\d+%/, '75%'));
                root.style.setProperty('--code-ink', currentColors.text);
            } else {
                // 浅色主题
                root.style.setProperty('--surface', currentColors.bg.replace(/\d+%/, (m) => `${parseInt(m) - 2}%`));
                root.style.setProperty('--text-semi', currentColors.text.replace(/\d+%/, '45%'));
                root.style.setProperty('--code-bg', currentColors.bg.replace(/\d+%/, (m) => `${parseInt(m) - 2}%`));
                root.style.setProperty('--code-text', currentColors.text.replace(/\d+%/, '45%'));
                root.style.setProperty('--code-ink', currentColors.text);
            }
        }

        // 更新 UI
        function updateUI() {
            ['accent', 'bg', 'text'].forEach(key => {
                const input = document.getElementById(`${key}-input`);
                const value = document.getElementById(`${key}-value`);
                if (input) input.value = currentColors[key];
                if (value) value.textContent = currentColors[key];
            });
        }

        // 导出 CSS
        document.getElementById('export-btn').onclick = () => {
            const css = `:root {\n  --accent: ${currentColors.accent};\n  --bg: ${currentColors.bg};\n  --text: ${currentColors.text};\n}`;
            navigator.clipboard.writeText(css);
            alert('✅ CSS 代码已复制到剪贴板！');
        };

        // 初始化
        initPresets();
        initColorControls();
        applyPreset('petal');
    </script>
</body>

</html>
