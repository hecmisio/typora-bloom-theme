<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloom 展示页 - 十套莫兰迪配色 | Typora Theme</title>

  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link id="theme-css" rel="stylesheet" href="dist/bloom-petal.css" />
  <link rel="stylesheet" href="site.css" />
  <script src="./assets/marked.min.js"></script>
  <script src="./assets/mermaid.min.js"></script>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="27809ba1-2fa2-4d3c-9568-894ab511cf52"></script>
</head>

<body>
  <div class="bg-canvas-wrap">
    <div class="bg-blob"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>
    <div class="bg-grain"></div>
  </div>

  <header class="topbar">
    <div class="topbar-inner">
      <a href="index.html" class="brand" title="Bloom">
        <svg class="brand-logo" viewBox="0 0 80 80" width="32" height="32" style="flex-shrink: 0;">
          <defs>
            <linearGradient id="brand-grad-showcase" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="var(--accent)" />
              <stop offset="1" stop-color="var(--accent-hover)" />
            </linearGradient>
          </defs>
          <g transform="translate(10,10)">
            <g fill="url(#brand-grad-showcase)">
              <path d="M30 12c7 0 12 6 12 12 0 7-6 14-12 14S18 31 18 24c0-6 5-12 12-12Z" />
              <path d="M16 28c6-4 14-3 18 2 5 6 2 16-6 20-8 4-17 1-20-7-2-6 2-12 8-15Z" opacity="0.92" />
              <path d="M44 28c6 3 10 9 8 15-3 8-12 11-20 7-8-4-11-14-6-20 4-5 12-6 18-2Z" opacity="0.92" />
            </g>
            <circle cx="30" cy="32" r="5" fill="var(--bg)" opacity="0.92" />
          </g>
        </svg>
        <span>目前包含 16 套色系，全部采用莫兰迪风格，旨在为长期写作提供最舒适的色彩陪伴。</span>
      </a>

      <div class="toolbar">
        <a href="index.html#features" class="nav-link">功能特性</a>
        <a href="showcase.html" class="nav-link">实时预览</a>
        <a href="index.html#changelog" class="nav-link">版本日志</a>
        <a href="https://github.com/webkubor/typora-Bloom-theme" target="_blank" class="nav-link github">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 2C6.477 2 2 6.477 2 12c0 4.419 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z">
            </path>
          </svg>
          GitHub
        </a>
        <div class="theme-dropdown" id="theme-dropdown">
          <button class="theme-trigger" id="theme-trigger">
            <span id="current-theme-name">花瓣模式 (Petal)</span>
            <svg class="chevron" viewBox="0 0 24 24" width="16" height="16">
              <path d="M7 10l5 5 5-5z" fill="currentColor" />
            </svg>
          </button>
          <div class="theme-menu" id="theme-menu"></div>
        </div>
      </div>
    </div>
  </header>

  <section class="hero reveal">
    <div class="hero-inner">
      <div class="hero-badge reveal-delay-1"><span class="hero-badge-dot"></span>Bloom · 实时预览</div>
      <h1 class="hero-title reveal-delay-2">Typora Bloom 主题实时预览</h1>
      <p class="hero-subtitle reveal-delay-2">完整 Markdown 内容 + 主题切换，实时查看排版与配色效果。</p>
      <div class="hero-actions reveal-delay-3">
        <a href="index.html#changelog" class="btn btn-secondary">查看版本日志</a>
      </div>
    </div>
  </section>

  <div class="layout">
    <main class="preview-container">
      <article id="write">
        <!-- Dynamic content will be loaded here -->
        <div style="text-align: center; padding: 3rem 0; color: var(--text-semi);">
          <p>正在加载 Markdown 内容...</p>
        </div>
      </article>
    </main>

    <aside class="sidebar reveal-delay-3"
      style="animation: revealUp 1s cubic-bezier(0.16, 1, 0.3, 1) both; animation-delay: 0.5s;">
      <div class="sidebar-card premium-card">
        <div class="sidebar-title">文件树预览</div>
        <div class="file-tree">
          <div class="file-tree-item" data-type="folder">
            <span class="file-tree-icon"></span>
            <span class="file-tree-label">Desktop</span>
          </div>
          <div class="file-tree-item is-active" data-type="file">
            <span class="file-tree-icon"></span>
            <span class="file-tree-label">Fluent.md</span>
          </div>
          <div class="file-tree-item" data-type="file">
            <span class="file-tree-icon"></span>
            <span class="file-tree-label">Notes.md</span>
          </div>
        </div>
      </div>
      <div class="sidebar-card premium-card">
        <div class="sidebar-title">提示</div>
        <p style="margin: 0; color: var(--text-semi); line-height: 1.7;">
          这页用于体验主题真实排版与交互，推荐切换四种主题对比效果。
        </p>
      </div>
      <div class="sidebar-card premium-card">
        <div class="sidebar-title">下一步</div>
        <a href="index.html#changelog" class="btn btn-secondary">查看版本日志</a>
      </div>
    </aside>
  </div>

  <script src="assets/theme-data.js"></script>
  <script src="site.js"></script>
</body>

</html>
