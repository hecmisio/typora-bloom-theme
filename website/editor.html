<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bloom 主题色编辑器 | Theme Color Editor</title>

    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link id="theme-css" rel="stylesheet" href="dist/bloom-petal.css" />
    <link rel="stylesheet" href="site.css" />
    <script src="./assets/marked.min.js"></script>
    <style>
        .editor-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2rem;
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .editor-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .editor-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text);
        }

        .preset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .preset-btn {
            padding: 0.75rem;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--bg);
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-size: 0.9rem;
        }

        .preset-btn:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .preset-btn.active {
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        .preset-color {
            width: 100%;
            height: 24px;
            border-radius: 6px;
            margin-bottom: 0.5rem;
        }

        .color-control {
            margin-bottom: 1.25rem;
        }

        .color-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-semi);
        }

        .color-value {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--accent);
        }

        .color-input-wrapper {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .color-picker {
            width: 60px;
            height: 40px;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
        }

        .color-text-input {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }

        .export-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .export-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .preview-container {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            min-height: 600px;
        }
    </style>
</head>

<body>
    <div class="bg-canvas-wrap">
        <div class="bg-blob"></div>
        <div class="bg-blob bg-blob-2"></div>
        <div class="bg-blob bg-blob-3"></div>
        <div class="bg-grain"></div>
    </div>

    <header class="topbar">
        <div class="topbar-inner">
            <a href="index.html" class="brand">
                <svg class="brand-logo" viewBox="0 0 80 80" width="32" height="32">
                    <defs>
                        <linearGradient id="brand-grad" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0" stop-color="var(--accent)" />
                            <stop offset="1" stop-color="var(--accent-hover)" />
                        </linearGradient>
                    </defs>
                    <g transform="translate(10,10)">
                        <g fill="url(#brand-grad)">
                            <path d="M30 12c7 0 12 6 12 12 0 7-6 14-12 14S18 31 18 24c0-6 5-12 12-12Z" />
                            <path d="M16 28c6-4 14-3 18 2 5 6 2 16-6 20-8 4-17 1-20-7-2-6 2-12 8-15Z" opacity="0.92" />
                            <path d="M44 28c6 3 10 9 8 15-3 8-12 11-20 7-8-4-11-14-6-20 4-5 12-6 18-2Z"
                                opacity="0.92" />
                        </g>
                        <circle cx="30" cy="32" r="5" fill="var(--bg)" opacity="0.92" />
                    </g>
                </svg>
                <span>主题色编辑器</span>
            </a>
            <div class="toolbar">
                <a href="index.html" class="nav-link">首页</a>
                <a href="showcase.html" class="nav-link">实时预览</a>
                <a href="editor.html" class="nav-link">编辑器</a>
            </div>
        </div>
    </header>

    <div class="editor-layout">
        <aside class="editor-panel">
            <h2 class="editor-title">🎨 主题预设</h2>
            <div class="preset-grid" id="preset-grid"></div>

            <h2 class="editor-title" style="margin-top: 2rem;">🎯 自定义颜色</h2>
            <div id="color-controls"></div>

            <button class="export-btn" id="export-btn">📋 导出 CSS 代码</button>
        </aside>

        <main class="preview-container">
            <article id="write">
                <div style="text-align: center; padding: 3rem 0; color: var(--text-semi);">
                    <p>正在加载预览内容...</p>
                </div>
            </article>
        </main>
    </div>

    <script src="assets/theme-data.js"></script>
    <script src="site.js"></script>
    <script>
        // 16 套主题预设配置
        const THEME_PRESETS = window.THEME_CONFIG || {};

        let currentColors = { ...THEME_PRESETS.petal };

        // 初始化预设按钮
        function initPresets() {
            const grid = document.getElementById('preset-grid');
            Object.entries(THEME_PRESETS).forEach(([key, preset]) => {
                const btn = document.createElement('button');
                btn.className = 'preset-btn';
                btn.innerHTML = `
          <div class="preset-color" style="background: ${preset.accent}"></div>
          <div>${preset.name}</div>
        `;
                btn.onclick = () => applyPreset(key);
                grid.appendChild(btn);
            });
        }

        // 应用预设
        function applyPreset(presetKey) {
            currentColors = { ...THEME_PRESETS[presetKey] };
            updateColors();
            updateUI();
            document.querySelectorAll('.preset-btn').forEach((btn, i) => {
                btn.classList.toggle('active', Object.keys(THEME_PRESETS)[i] === presetKey);
            });
        }

        // 初始化颜色控制器
        function initColorControls() {
            const container = document.getElementById('color-controls');
            const controls = [
                { key: 'accent', label: '强调色 (Accent)' },
                { key: 'bg', label: '背景色 (Background)' },
                { key: 'text', label: '文字色 (Text)' }
            ];

            controls.forEach(({ key, label }) => {
                const div = document.createElement('div');
                div.className = 'color-control';
                div.innerHTML = `
          <div class="color-label">
            <span>${label}</span>
            <span class="color-value" id="${key}-value">${currentColors[key]}</span>
          </div>
          <div class="color-input-wrapper">
            <input type="color" class="color-picker" id="${key}-picker" />
            <input type="text" class="color-text-input" id="${key}-input" value="${currentColors[key]}" />
          </div>
        `;
                container.appendChild(div);

                // 绑定事件
                const input = div.querySelector(`#${key}-input`);
                const picker = div.querySelector(`#${key}-picker`);
                const hex = toHexString(currentColors[key]);
                if (picker && hex) picker.value = hex;

                input.oninput = (e) => {
                    currentColors[key] = e.target.value;
                    updateColors();
                    document.getElementById(`${key}-value`).textContent = e.target.value;
                    const nextHex = toHexString(e.target.value);
                    if (picker && nextHex) picker.value = nextHex;
                };

                if (picker) {
                    picker.oninput = (e) => {
                        currentColors[key] = e.target.value;
                        updateColors();
                        input.value = e.target.value;
                        document.getElementById(`${key}-value`).textContent = e.target.value;
                    };
                }
            });
        }

        function clampByte(value) {
            return Math.max(0, Math.min(255, Math.round(value)));
        }

        function parseHexColor(value) {
            const hex = value.trim();
            const short = hex.match(/^#([0-9a-f]{3})$/i);
            if (short) {
                const digits = short[1].split('');
                return digits.map((ch) => parseInt(ch + ch, 16));
            }
            const long = hex.match(/^#([0-9a-f]{6})$/i);
            if (long) {
                return [
                    parseInt(long[1].slice(0, 2), 16),
                    parseInt(long[1].slice(2, 4), 16),
                    parseInt(long[1].slice(4, 6), 16)
                ];
            }
            return null;
        }

        function parseRgbColor(value) {
            const match = value.match(/rgb\\(\\s*([0-9.]+)\\s*,\\s*([0-9.]+)\\s*,\\s*([0-9.]+)\\s*\\)/i);
            if (!match) return null;
            return [Number(match[1]), Number(match[2]), Number(match[3])].map(clampByte);
        }

        function parseOklchColor(value) {
            const match = value.match(/oklch\\(\\s*([0-9.]+)%\\s+([0-9.]+)\\s+([0-9.]+)\\s*\\)/i);
            if (!match) return null;
            return {
                L: Number(match[1]) / 100,
                C: Number(match[2]),
                H: Number(match[3])
            };
        }

        function oklchToRgb(L, C, H) {
            const hRad = (H * Math.PI) / 180;
            const a = C * Math.cos(hRad);
            const b = C * Math.sin(hRad);

            const l_ = L + 0.3963377774 * a + 0.2158037573 * b;
            const m_ = L - 0.1055613458 * a - 0.0638541728 * b;
            const s_ = L - 0.0894841775 * a - 1.291485548 * b;

            const l = l_ ** 3;
            const m = m_ ** 3;
            const s = s_ ** 3;

            let r = 4.0767416621 * l - 3.3077115913 * m + 0.2309699292 * s;
            let g = -1.2684380046 * l + 2.6097574011 * m - 0.3413193965 * s;
            let bOut = -0.0041960863 * l - 0.7034186147 * m + 1.707614701 * s;

            const rgb = [r, g, bOut].map((channel) => {
                const clamped = Math.max(0, Math.min(1, channel));
                const srgb = clamped <= 0.0031308
                    ? 12.92 * clamped
                    : 1.055 * clamped ** (1 / 2.4) - 0.055;
                return clampByte(srgb * 255);
            });

            return rgb;
        }

        function toRgb(value) {
            const hex = parseHexColor(value);
            if (hex) return hex;
            const rgb = parseRgbColor(value);
            if (rgb) return rgb;
            const oklch = parseOklchColor(value);
            if (oklch) return oklchToRgb(oklch.L, oklch.C, oklch.H);
            return null;
        }

        function getRelativeLuminance(value) {
            const rgb = toRgb(value);
            if (!rgb) return null;
            const linear = rgb.map((channel) => {
                const srgb = channel / 255;
                return srgb <= 0.04045 ? srgb / 12.92 : ((srgb + 0.055) / 1.055) ** 2.4;
            });
            return 0.2126 * linear[0] + 0.7152 * linear[1] + 0.0722 * linear[2];
        }

        function toRgbString(value) {
            const rgb = toRgb(value);
            return rgb ? rgb.join(', ') : null;
        }

        function toHexString(value) {
            const rgb = toRgb(value);
            if (!rgb) return null;
            return `#${rgb.map((channel) => channel.toString(16).padStart(2, '0')).join('')}`;
        }

        // 更新 CSS 变量
        function updateColors() {
            const root = document.documentElement;

            // 基础颜色
            root.style.setProperty('--accent', currentColors.accent);
            root.style.setProperty('--bg', currentColors.bg);
            root.style.setProperty('--text', currentColors.text);

            const accentRgb = toRgbString(currentColors.accent);
            if (accentRgb) {
                root.style.setProperty('--accent-rgb', accentRgb);
            }

            const textRgb = toRgbString(currentColors.text);
            if (textRgb) {
                root.style.setProperty('--text-rgb', textRgb);
            }

            // 判断是否为深色主题（背景亮度 < 0.5）
            const bgLuma = getRelativeLuminance(currentColors.bg);
            const isDark = bgLuma !== null ? bgLuma < 0.5 : false;

            // 根据背景色自动计算衍生颜色
            if (isDark) {
                root.style.setProperty('--surface', 'color-mix(in oklch, var(--bg), white 6%)');
                root.style.setProperty('--text-semi', 'color-mix(in oklch, var(--text), black 30%)');
                root.style.setProperty('--code-bg', 'color-mix(in oklch, var(--bg), white 4%)');
                root.style.setProperty('--code-text', 'color-mix(in oklch, var(--text), black 22%)');
                root.style.setProperty('--code-ink', 'var(--text)');
            } else {
                root.style.setProperty('--surface', 'color-mix(in oklch, var(--bg), black 2%)');
                root.style.setProperty('--text-semi', 'color-mix(in oklch, var(--text), white 45%)');
                root.style.setProperty('--code-bg', 'color-mix(in oklch, var(--bg), black 2%)');
                root.style.setProperty('--code-text', 'color-mix(in oklch, var(--text), white 35%)');
                root.style.setProperty('--code-ink', 'var(--text)');
            }
        }

        // 更新 UI
        function updateUI() {
            ['accent', 'bg', 'text'].forEach(key => {
                const input = document.getElementById(`${key}-input`);
                const value = document.getElementById(`${key}-value`);
                const picker = document.getElementById(`${key}-picker`);
                if (input) input.value = currentColors[key];
                if (value) value.textContent = currentColors[key];
                const hex = toHexString(currentColors[key]);
                if (picker && hex) picker.value = hex;
            });
        }

        // 导出 CSS
        document.getElementById('export-btn').onclick = () => {
            const css = `:root {\n  --accent: ${currentColors.accent};\n  --bg: ${currentColors.bg};\n  --text: ${currentColors.text};\n}`;
            navigator.clipboard.writeText(css);
            alert('✅ CSS 代码已复制到剪贴板！');
        };

        // 初始化
        initPresets();
        initColorControls();
        applyPreset(window.THEME_DEFAULT || 'petal');
    </script>
</body>

</html>
