## v1.2.0 · 2026-01-05
- **全系莫兰迪化**：对所有主题进行重构，采用更护眼、高级的 **Morandi (莫兰迪)** 低饱和色调。并将原 `Light/Dark` 升级为 `Petal/Petal Dark`。
- **新增 Terracotta**：新增一对 **陶土橙 (Terracotta)** 配色，灵感源自复古陶土，为写作提供温暖、稳重的色彩氛围。
- **深色模式补完**：将原 `Forest` 升级为 `Verdant Dark`，至此每款浅色主题（Petal, Mist, Verdant, Stone, Terracotta）均有对应的深色变体。
- **配色总数达 10 款**：提供 5 套浅色 + 5 套深色的完整配色矩阵，满足不同写作场景的视觉偏好。
- **对比度修复 (Accessibility)**：优化了 `Mist`、`Stone` 和 `Verdant` 的强调色亮度，显著提升文字链接的可读性。
- **视觉平衡**：针对 `Cyber` 主题进行了色相偏移与饱和度下调，消除屏幕闪烁感；调深所有深色模式的背景亮度（由 22% 降至 14%），实现极致深邃感。
- **工程化清理**：移除冗余旧主题文件，全面优化打包体积与构建效率。

## v1.1.1 · 2025-12-28
- **主题扩张**：新增三款 **莫兰迪色系 (Morandi)** —— 雾蓝 (Mist)、草木 (Verdant)、暖石 (Stone)，提供极高的高级感与长效阅读舒适度。
- **新增**：Spring (春季) 粉紫色主题变体，采用清冷柔美的薰衣草色调。
- **UI 重构**：全新**下拉式主题切换器**，支持分类展示八款主题，优化多主题下的导航体验。
- **全站同步**：首页与实时预览页 (Showcase) 交互逻辑全量对齐。
- **视觉迭代**：将蓝色主题进化为更有发光质感的“荧光蓝 (Cyber Blue)”，全面对齐深色模式下的顶级对比度与辨识度。
- **现代化架构**：全量迁移至 **OKLCH 色彩空间**，实现更科学、通透颜色感知与动态状态生成。
- **系统化布局**：引入基于 **8px 的原子间距系统** (`--space-`)，全站 UI 比例更趋完美。
- **视觉优化**：重构侧边栏图标逻辑，修复 Light 主题标题栏异常蓝色，优化全场动效性能。
- **交互增强**：全新“潜行式”专注模式 (Focus Mode)，提供极致沉浸的深夜写作环境。

